version: '3.8'

services:
  # PHP/Apache Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jajr-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - DB_HOST=db
      - DB_DATABASE=attendance-system
      - DB_USERNAME=attendance_user
      - DB_PASSWORD=JaJr12390786@
      - APP_ENV=development
      - APP_DEBUG=true
    depends_on:
      - db
    networks:
      - jajr-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: jajr-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=attendance-system
      - MYSQL_USER=attendance_user
      - MYSQL_PASSWORD=JaJr12390786@
    volumes:
      - db_data:/var/lib/mysql
      - ./attendance-system.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
    networks:
      - jajr-network
    command: --default-authentication-plugin=mysql_native_password

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: jajr-phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=root_password
    depends_on:
      - db
    networks:
      - jajr-network

volumes:
  db_data:

networks:
  jajr-network:
    driver: bridge
