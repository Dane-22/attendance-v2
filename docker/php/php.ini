; PHP Configuration for Docker
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Error reporting (development)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Timezone
date.timezone = Asia/Manila

; Session settings
session.gc_maxlifetime = 7200

; Enable PDO and MySQL extensions (already installed, but ensure they load)
extension=pdo_mysql
extension=mysqli
